name: silver-gold
environments:
  - environment_key: default
    spec:
      client: "2"
      dependencies:
        - "{{project_path}}"
tasks:
  - task_key: silver_to_gold
    environment_key: default
    spark_python_task:
      python_file: tasks/task_silver_to_gold.py
    retry_on_timeout: true
    max_retries: 0
    timeout_seconds: 3600
    email_notifications:
      on_failure:
        - "{{alert_email}}"