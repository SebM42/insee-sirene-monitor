name: reset-pipeline
environments:
  - environment_key: default
    spec:
      client: "2"
      dependencies:
        - "{{project_path}}"
tasks:
  - task_key: reset_pipeline
    environment_key: default
    spark_python_task:
      python_file: tasks/task_bronze_to_silver.py
    email_notifications:
      on_failure:
        - "{{alert_email}}"