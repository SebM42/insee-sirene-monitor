name: ingestion-bronze
schedule:
  quartz_cron_expression: "0 0 10 * * ?"  # 10th of each month at midnight
  timezone_id: "Europe/Paris"

environments:
  - environment_key: default
    spec:
      client: "2"
      dependencies:
        - "{{project_path}}"

tasks:
  - task_key: ingestion_short
    environment_key: default
    spark_python_task:
      python_file: tasks/task_ingestion.py
    retry_on_timeout: true
    max_retries: 10
    min_retry_interval_millis: 30000  # 30s
    timeout_seconds: 3600
    email_notifications:
      on_failure:
        - "{{secrets/databricks-credentials/alert-email}}"

  - task_key: ingestion_long
    depends_on:
      - task_key: ingestion_short
    run_if: AT_LEAST_ONE_FAILED
    environment_key: default
    spark_python_task:
      python_file: tasks/task_ingestion.py
    retry_on_timeout: true
    max_retries: -1
    min_retry_interval_millis: 3600000
    timeout_seconds: 0
    email_notifications:
      on_failure:
        - "{{secrets/databricks-credentials/alert-email}}"
      on_start:
        - "{{secrets/databricks-credentials/alert-email}}"